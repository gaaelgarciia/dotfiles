# PLUGINS
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'

# DESIGN TWEAKS
set -g default-terminal "screen-256color"
set -g base-index 1 
set -g renumber-windows on
set -g status-position bottom
set -g status-style bg=default
set -g status-right ""
set -g status-justify absolute-centre
set -g mouse on
set -g window-status-current-format "#[fg=#181616,bg=#c5c9c5] #I:#W "
set -g window-status-format "#[fg=#c5c9c5] #I:#W "
setw -g mode-keys vi # Hell yeah
set -g cursor-style bar # GOAT
set -sg escape-time 10 # This is just some copium shit tbh
set -g cursor-colour "#c5c9c5"

set -g window-style 'bg=#181616'
set -g window-active-style 'bg=#12120f'
set -g pane-border-style 'fg=#625e5a'
set -g pane-active-border-style 'fg=#7fb4ca,bold'

unbind r
bind r source-file ~/.tmux.conf
bind v split-window -h -c "#{pane_current_path}"
bind h split-window -v -c "#{pane_current_path}"
set -g prefix C-s

run '~/.tmux/plugins/tpm/tpm'
